<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TPASS 即時看板</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-50 font-sans pb-24">

    <nav class="bg-indigo-700 text-white p-4 shadow-md sticky top-0 z-50 flex justify-between items-center">
        <h1 class="text-lg font-bold">TPASS 實時足跡</h1>
        <button onclick="fetchData()" class="text-xs bg-indigo-500 px-2 py-1 rounded">手動更新</button>
    </nav>

    <div id="loading" class="flex justify-center items-center h-64 text-indigo-600 font-bold">同步雲端資料中...</div>

    <main id="app" class="max-w-md mx-auto p-4 hidden">
        <div id="home" class="tab-content space-y-4">
            <div class="bg-gradient-to-br from-indigo-600 to-blue-500 p-6 rounded-3xl text-white shadow-lg">
                <p class="opacity-80 text-sm">已回本車資總計</p>
                <h2 id="total-savings" class="text-5xl font-black mt-1">NT$ 0</h2>
            </div>
            
            <div class="grid grid-cols-2 gap-3">
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 text-center">
                    <p class="text-xs text-slate-400 mb-1">最常搭乘日</p>
                    <p id="busy-day" class="font-bold text-slate-700 font-mono">--</p>
                </div>
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 text-center">
                    <p class="text-xs text-slate-400 mb-1">主力運具</p>
                    <p id="top-transport" class="font-bold text-slate-700">--</p>
                </div>
            </div>
            <canvas id="transportChart" class="bg-white p-4 rounded-2xl shadow-sm"></canvas>
        </div>

        <div id="youbike" class="tab-content hidden space-y-4">
            <div class="bg-orange-500 p-5 rounded-2xl text-white shadow-md">
                <p class="text-sm opacity-90">YouBike 累計回本</p>
                <p class="text-3xl font-bold">NT$ <span id="yb-savings">0</span></p>
            </div>
            <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
                <h3 class="font-bold text-slate-700 mb-3 text-sm">🚲 騎乘分析</h3>
                <p class="text-sm text-slate-600 mb-2">車種：<span id="yb-type-rank" class="font-medium">--</span></p>
                <p class="text-sm text-slate-600 mb-2">解鎖：騎過 <span id="yb-bike-count" class="font-bold text-orange-600">--</span> 台不同的車</p>
                <p class="text-sm text-slate-600">最愛車號：<span id="yb-top-bike" class="bg-orange-100 px-2 rounded font-mono">--</span></p>
            </div>
            <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
                <h3 class="font-bold text-slate-700 mb-2 text-sm">📍 熱門站點 Top 3</h3>
                <ul id="yb-stations" class="text-sm divide-y"></ul>
                <h3 class="font-bold text-slate-700 mt-4 mb-2 text-sm">🛤️ 經典路線 (起 ↔ 迄)</h3>
                <p id="yb-top-route" class="text-sm text-slate-600 p-2 bg-slate-50 rounded">--</p>
            </div>
        </div>

        <div id="bus" class="tab-content hidden space-y-4">
             <div class="bg-emerald-600 p-5 rounded-2xl text-white shadow-md">
                <p class="text-sm opacity-90">公車累計回本</p>
                <p class="text-3xl font-bold">NT$ <span id="bus-savings">0</span></p>
            </div>
            <div class="bg-white p-4 rounded-2xl shadow-sm">
                <h3 class="font-bold text-slate-700 mb-3">最常搭乘：<span id="top-bus-route" class="text-emerald-600">--</span></h3>
                <h3 class="font-bold text-slate-700 mb-2 text-sm">📍 熱門站點 Top 5</h3>
                <ul id="bus-stations" class="text-sm divide-y"></ul>
            </div>
        </div>

        <div id="train" class="tab-content hidden space-y-4">
             <div class="bg-blue-800 p-5 rounded-2xl text-white shadow-md">
                <p class="text-sm opacity-90">台鐵累計回本</p>
                <p class="text-3xl font-bold">NT$ <span id="train-savings">0</span></p>
            </div>
            <div class="bg-white p-4 rounded-2xl shadow-sm">
                <h3 class="font-bold text-slate-700 mb-2 text-sm">📍 熱門車站 Top 3</h3>
                <ul id="train-stations" class="text-sm divide-y"></ul>
            </div>
        </div>
    </main>

    <div class="fixed bottom-0 left-0 right-0 bg-white/80 backdrop-blur-md border-t border-slate-200 flex justify-around p-3 pb-6 text-[10px] font-medium text-slate-500">
        <button onclick="showTab('home')" class="flex flex-col items-center space-y-1"><span class="text-xl">📊</span><span>首頁</span></button>
        <button onclick="showTab('youbike')" class="flex flex-col items-center space-y-1"><span class="text-xl">🚲</span><span>YouBike</span></button>
        <button onclick="showTab('bus')" class="flex flex-col items-center space-y-1"><span class="text-xl">🚌</span><span>公車</span></button>
        <button onclick="showTab('train')" class="flex flex-col items-center space-y-1"><span class="text-xl">🚆</span><span>台鐵</span></button>
    </div>

    <script>
        const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/1-w_EXyQ3GqtBSNeU8YlbUnvwnC-gP98eP_-dGEtTg7g/edit?usp=sharing';

        let myChart;

        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        async function fetchData() {
            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('app').classList.add('hidden');
            
            Papa.parse(SHEET_CSV_URL, {
                download: true,
                header: true,
                complete: function(results) {
                    processData(results.data);
                    document.getElementById('loading').classList.add('hidden');
                    document.getElementById('app').classList.remove('hidden');
                }
            });
        }

        function processData(data) {
            let stats = {
                total: 0, yb: 0, bus: 0, train: 0,
                transports: {}, days: {}, ybTypes: {}, ybBikes: {}, 
                ybStations: {}, ybRoutes: {}, busRoutes: {}, busStations: {}, trainStations: {}
            };

            data.forEach(row => {
                const ybFee = parseFloat(row['YB車資']) || 0;
                const busFee = parseFloat(row['NB車資']) || 0;
                const trFee = parseFloat(row['TR車資']) || 0;
                
                stats.total += (ybFee + busFee + trFee);
                stats.yb += ybFee; stats.bus += busFee; stats.train += trFee;

                if(row['運具']) stats.transports[row['運具']] = (stats.transports[row['運具']] || 0) + 1;
                if(row['日期']) stats.days[row['日期']] = (stats.days[row['日期']] || 0) + 1;

                if(row['運具'] === 'YouBike') {
                    if(row['YB車種']) stats.ybTypes[row['YB車種']] = (stats.ybTypes[row['YB車種']] || 0) + 1;
                    if(row['YB車號']) stats.ybBikes[row['YB車號']] = (stats.ybBikes[row['YB車號']] || 0) + 1;
                    [row['YB起站'], row['YB迄站']].forEach(s => { if(s) stats.ybStations[s] = (stats.ybStations[s] || 0) + 1; });
                    const route = `${row['YB起站']} → ${row['YB迄站']}`;
                    if(row['YB起站'] && row['YB迄站']) stats.ybRoutes[route] = (stats.ybRoutes[route] || 0) + 1;
                }
                if(row['運具'] === '大台南公車') {
                    if(row['NB路線']) stats.busRoutes[row['NB路線']] = (stats.busRoutes[row['NB路線']] || 0) + 1;
                    [row['NB起站'], row['NB迄站']].forEach(s => { if(s) stats.busStations[s] = (stats.busStations[s] || 0) + 1; });
                }
                if(row['運具'] === '台鐵') {
                    [row['TR起站'], row['TR迄站']].forEach(s => { if(s) stats.trainStations[s] = (stats.trainStations[s] || 0) + 1; });
                }
            });

            // 渲染數據
            document.getElementById('total-savings').innerText = `NT$ ${stats.total}`;
            document.getElementById('yb-savings').innerText = stats.yb;
            document.getElementById('bus-savings').innerText = stats.bus;
            document.getElementById('train-savings').innerText = stats.train;

            const topTrans = Object.entries(stats.transports).sort((a,b)=>b[1]-a[1])[0];
            document.getElementById('top-transport').innerText = topTrans ? topTrans[0] : '--';

            const topDay = Object.entries(stats.days).sort((a,b)=>b[1]-a[1])[0];
            document.getElementById('busy-day').innerText = topDay ? topDay[0] : '--';

            // YouBike 詳細
            const ybTypeStr = Object.entries(stats.ybTypes).map(([k,v])=>`${k}(${v}次)`).join(' / ');
            document.getElementById('yb-type-rank').innerText = ybTypeStr || '--';
            document.getElementById('yb-bike-count').innerText = Object.keys(stats.ybBikes).length;
            const topBike = Object.entries(stats.ybBikes).sort((a,b)=>b[1]-a[1])[0];
            document.getElementById('yb-top-bike').innerText = topBike ? topBike[0] : '--';
            const topRoute = Object.entries(stats.ybRoutes).sort((a,b)=>b[1]-a[1])[0];
            document.getElementById('yb-top-route').innerText = topRoute ? topRoute[0] : '無數據';

            renderUIList('yb-stations', stats.ybStations, 3);
            renderUIList('bus-stations', stats.busStations, 5);
            renderUIList('train-stations', stats.trainStations, 3);
            
            const topBus = Object.entries(stats.busRoutes).sort((a,b)=>b[1]-a[1])[0];
            document.getElementById('top-bus-route').innerText = topBus ? topBus[0] : '--';

            updateChart(stats.transports);
        }

        function renderUIList(id, dataMap, n) {
            const sorted = Object.entries(dataMap).sort((a,b)=>b[1]-a[1]).slice(0, n);
            document.getElementById(id).innerHTML = sorted.map(([name, count]) => 
                `<li class="flex justify-between py-2 text-slate-600"><span>${name}</span><span class="font-bold text-slate-400">${count}次</span></li>`
            ).join('');
        }

        function updateChart(transData) {
            const ctx = document.getElementById('transportChart').getContext('2d');
            if(myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: Object.keys(transData),
                    datasets: [{ data: Object.values(transData), backgroundColor: ['#6366f1', '#f59e0b', '#10b981'] }]
                },
                options: { plugins: { legend: { position: 'bottom' } } }
            });
        }

        // 啟動
        fetchData();
    </script>
</body>
</html>
