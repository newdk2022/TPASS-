<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TPASS 進度看板</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .tab-content.hidden { display: none; }
        .record-card { border-left: 4px solid; }
    </style>
</head>
<body class="bg-gray-50 font-sans pb-24 text-slate-800">

    <nav class="bg-indigo-600 text-white p-4 shadow-sm sticky top-0 z-50 flex justify-between items-center">
        <h1 class="text-lg font-bold">TPASS 實時足跡</h1>
        <button onclick="fetchData()" class="text-xs bg-indigo-500 px-3 py-1 rounded-full">同步資料</button>
    </nav>

    <!-- 快速載入指示 -->
    <div id="loading" class="flex flex-col justify-center items-center h-64 text-indigo-600">
        <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-indigo-600 mb-2"></div>
        <p class="text-sm font-medium">讀取中...</p>
    </div>

    <main id="app" class="max-w-md mx-auto p-4 hidden">
        
        <!-- 首頁 -->
        <div id="home" class="tab-content space-y-5">
            <!-- 回本進度條卡片 -->
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
                <div class="flex justify-between items-end mb-2">
                    <h2 class="text-gray-500 text-sm font-bold">月票回本進度</h2>
                    <span id="progress-text" class="text-indigo-600 font-black text-xl">0%</span>
                </div>
                
                <div class="w-full bg-gray-100 rounded-full h-4 mb-3 overflow-hidden">
                    <div id="main-progress-bar" class="bg-indigo-600 h-full rounded-full transition-all duration-1000 w-0"></div>
                </div>
                
                <div class="flex justify-between items-center">
                    <p class="text-2xl font-black text-slate-700" id="total-savings-val">NT$ 0 / $399</p>
                    <p id="latest-date" class="text-[10px] text-gray-400 italic">--</p>
                </div>
            </div>

            <!-- 分析卡片 -->
            <div class="grid grid-cols-2 gap-3">
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
                    <p class="text-[11px] text-gray-400 mb-1 font-bold">主力運具</p>
                    <p id="top-transport" class="font-bold text-slate-700">--</p>
                    <p id="top-transport-count" class="text-[10px] text-indigo-500 mt-1">-- 次搭乘</p>
                </div>
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
                    <p class="text-[11px] text-gray-400 mb-1 font-bold">最多紀錄日</p>
                    <p id="busy-day" class="font-bold text-slate-700 font-mono text-sm">--</p>
                    <p id="busy-count" class="text-[10px] text-indigo-500 mt-1">-- 筆資料</p>
                </div>
            </div>

            <!-- 各運具分項回本 -->
            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                <div class="p-4 border-b border-gray-50 font-bold text-sm text-gray-500">運具回本佔比</div>
                
                <div class="divide-y divide-gray-50">
                    <!-- YouBike -->
                    <div onclick="showTab('youbike')" class="p-4 active:bg-gray-50 transition flex flex-col space-y-2">
                        <div class="flex justify-between items-center text-sm">
                            <span class="flex items-center font-bold">🚲 YouBike (<span id="yb-count">0</span>次)</span>
                            <span class="text-orange-600 font-bold" id="yb-percent">0%</span>
                        </div>
                        <div class="w-full bg-gray-50 rounded-full h-2 overflow-hidden">
                            <div id="yb-mini-bar" class="bg-orange-400 h-full transition-all duration-700 w-0"></div>
                        </div>
                        <p class="text-[11px] text-gray-400" id="yb-sum-text">已回本 NT$ 0</p>
                    </div>

                    <!-- 公車 -->
                    <div onclick="showTab('bus')" class="p-4 active:bg-gray-50 transition flex flex-col space-y-2">
                        <div class="flex justify-between items-center text-sm">
                            <span class="flex items-center font-bold">🚌 公車 (<span id="bus-count">0</span>次)</span>
                            <span class="text-emerald-600 font-bold" id="bus-percent">0%</span>
                        </div>
                        <div class="w-full bg-gray-50 rounded-full h-2 overflow-hidden">
                            <div id="bus-mini-bar" class="bg-emerald-500 h-full transition-all duration-700 w-0"></div>
                        </div>
                        <p class="text-[11px] text-gray-400" id="bus-sum-text">已回本 NT$ 0</p>
                    </div>

                    <!-- 台鐵 -->
                    <div onclick="showTab('train')" class="p-4 active:bg-gray-50 transition flex flex-col space-y-2">
                        <div class="flex justify-between items-center text-sm">
                            <span class="flex items-center font-bold">🚆 台鐵 (<span id="train-count">0</span>次)</span>
                            <span class="text-blue-700 font-bold" id="train-percent">0%</span>
                        </div>
                        <div class="w-full bg-gray-50 rounded-full h-2 overflow-hidden">
                            <div id="train-mini-bar" class="bg-blue-600 h-full transition-all duration-700 w-0"></div>
                        </div>
                        <p class="text-[11px] text-gray-400" id="train-sum-text">已回本 NT$ 0</p>
                    </div>
                </div>
            </div>
            
            <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
                <canvas id="transportChart" height="200"></canvas>
            </div>
        </div>

        <!-- YouBike 分頁 -->
        <div id="youbike" class="tab-content hidden space-y-4">
            <div class="bg-orange-500 p-6 rounded-3xl text-white shadow-md">
                <p class="text-sm opacity-90">YouBike 累計回本</p>
                <p class="text-4xl font-black">NT$ <span id="yb-savings">0</span></p>
            </div>
            <div id="yb-list" class="space-y-3"></div>
        </div>

        <!-- 公車分頁 -->
        <div id="bus" class="tab-content hidden space-y-4">
            <div class="bg-emerald-600 p-6 rounded-3xl text-white shadow-md">
                <p class="text-sm opacity-90">公車累計回本</p>
                <p class="text-4xl font-black">NT$ <span id="bus-savings">0</span></p>
            </div>
            <div id="bus-list" class="space-y-3"></div>
        </div>

        <!-- 台鐵分頁 -->
        <div id="train" class="tab-content hidden space-y-4">
            <div class="bg-blue-800 p-6 rounded-3xl text-white shadow-md">
                <p class="text-sm opacity-90">台鐵累計回本</p>
                <p class="text-4xl font-black">NT$ <span id="train-savings">0</span></p>
            </div>
            <div id="train-list" class="space-y-3"></div>
        </div>
    </main>

    <!-- 底部導覽列 -->
    <div class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-md border-t border-gray-200 flex justify-around p-3 pb-8 text-[11px] font-bold text-gray-400 z-50">
        <button onclick="showTab('home')" class="flex flex-col items-center space-y-1"><span class="text-2xl">📊</span><span>首頁</span></button>
        <button onclick="showTab('youbike')" class="flex flex-col items-center space-y-1"><span class="text-2xl">🚲</span><span>YouBike</span></button>
        <button onclick="showTab('bus')" class="flex flex-col items-center space-y-1"><span class="text-2xl">🚌</span><span>公車</span></button>
        <button onclick="showTab('train')" class="flex flex-col items-center space-y-1"><span class="text-2xl">🚆</span><span>台鐵</span></button>
    </div>

    <script>
        const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS6jX6fVzdUxOnn4v3xIeB8mC_adsPJLUTTIhPpQaf_mPjG2OtPQt1HTu76Eie-_vjgpFVD5SQs7RiO/pub?output=csv';
        let myChart;

        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            window.scrollTo(0,0);
        }

        async function fetchData() {
            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('app').classList.add('hidden');
            
            Papa.parse(SHEET_CSV_URL, {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    const cleanData = results.data
                        .filter(row => {
                            const transport = row['運具'] || row[' 運具'] || "";
                            return transport.trim() !== "";
                        })
                        .map(row => {
                            const newRow = {};
                            Object.keys(row).forEach(key => {
                                newRow[key.trim()] = row[key] ? row[key].toString().trim() : "";
                            });
                            return newRow;
                        });
                    processData(cleanData);
                    document.getElementById('loading').classList.add('hidden');
                    document.getElementById('app').classList.remove('hidden');
                }
            });
        }

        function processData(data) {
            let stats = {
                total: 0, yb: 0, bus: 0, train: 0,
                transports: {}, days: {}
            };
            let lists = { yb: '', bus: '', train: '' };

            const sortedData = [...data].reverse();
            const latestDate = sortedData[0]['日期'] || '--';

            sortedData.forEach(row => {
                const ybFee = parseFloat(row['YB車資']) || 0;
                const busFee = parseFloat(row['NB車資']) || 0;
                const trFee = parseFloat(row['TR車資']) || 0;
                
                stats.total += (ybFee + busFee + trFee);
                stats.yb += ybFee; stats.bus += busFee; stats.train += trFee;

                const transport = row['運具'];
                if(transport) stats.transports[transport] = (stats.transports[transport] || 0) + 1;
                if(row['日期']) stats.days[row['日期']] = (stats.days[row['日期']] || 0) + 1;

                if(transport === 'YouBike') {
                    lists.yb += `<div class="bg-white p-3 rounded-xl shadow-sm record-card border-orange-400">
                        <div class="flex justify-between text-[10px] mb-1"><span class="text-orange-600 font-bold">${row['日期']} | ${row['YB車種']}</span><span class="font-bold text-orange-600">$${ybFee}</span></div>
                        <p class="text-sm font-bold text-slate-700">${row['YB起站']} ➔ ${row['YB迄站']}</p></div>`;
                } else if(transport === '大台南公車') {
                    lists.bus += `<div class="bg-white p-3 rounded-xl shadow-sm record-card border-emerald-500">
                        <div class="flex justify-between text-[10px] mb-1"><span class="text-emerald-600 font-bold">${row['日期']} | ${row['NB路線']}</span><span class="font-bold text-emerald-600">$${busFee}</span></div>
                        <p class="text-sm font-bold text-slate-700">${row['NB起站']} ➔ ${row['NB迄站']}</p></div>`;
                } else if(transport === '台鐵') {
                    lists.train += `<div class="bg-white p-3 rounded-xl shadow-sm record-card border-blue-700">
                        <div class="flex justify-between text-[10px] mb-1"><span class="text-blue-700 font-bold">${row['日期']} | 區間車</span><span class="font-bold text-blue-700">$${trFee}</span></div>
                        <p class="text-sm font-bold text-slate-700">${row['TR起站']} ➔ ${row['TR迄站']}</p></div>`;
                }
            });

            // 主進度條渲染
            const totalVal = Math.round(stats.total);
            const progress = Math.min((totalVal / 399) * 100, 100).toFixed(1);
            document.getElementById('progress-text').innerText = `${progress}%`;
            document.getElementById('main-progress-bar').style.width = `${progress}%`;
            document.getElementById('total-savings-val').innerText = `NT$ ${totalVal} / $399`;
            document.getElementById('latest-date').innerText = `統計至 ${latestDate}`;

            // 分析渲染
            const sortedTrans = Object.entries(stats.transports).sort((a,b)=>b[1]-a[1]);
            document.getElementById('top-transport').innerText = sortedTrans[0] ? sortedTrans[0][0] : '--';
            document.getElementById('top-transport-count').innerText = sortedTrans[0] ? `${sortedTrans[0][1]}次搭乘` : '--';

            const sortedDays = Object.entries(stats.days).sort((a,b)=>b[1]-a[1]);
            document.getElementById('busy-day').innerText = sortedDays[0] ? sortedDays[0][0] : '--';
            document.getElementById('busy-count').innerText = sortedDays[0] ? `${sortedDays[0][1]} 筆資料` : '--';

            // 運具分項渲染
            const updateMiniBar = (id, fee, count, total) => {
                const p = total > 0 ? ((fee / total) * 100).toFixed(0) : 0;
                document.getElementById(`${id}-count`).innerText = count;
                document.getElementById(`${id}-percent`).innerText = `${p}%`;
                document.getElementById(`${id}-mini-bar`).style.width = `${p}%`;
                document.getElementById(`${id}-sum-text`).innerText = `已回本 NT$ ${Math.round(fee)}`;
            };
            updateMiniBar('yb', stats.yb, stats.transports['YouBike'] || 0, stats.total);
            updateMiniBar('bus', stats.bus, stats.transports['大台南公車'] || 0, stats.total);
            updateMiniBar('train', stats.train, stats.transports['台鐵'] || 0, stats.total);

            // 分頁資料
            document.getElementById('yb-savings').innerText = Math.round(stats.yb);
            document.getElementById('bus-savings').innerText = Math.round(stats.bus);
            document.getElementById('train-savings').innerText = Math.round(stats.train);
            document.getElementById('yb-list').innerHTML = lists.yb;
            document.getElementById('bus-list').innerHTML = lists.bus;
            document.getElementById('train-list').innerHTML = lists.train;

            updateChart(stats.transports);
        }

        function updateChart(transData) {
            const ctx = document.getElementById('transportChart').getContext('2d');
            if(myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: Object.keys(transData),
                    datasets: [{ 
                        data: Object.values(transData), 
                        backgroundColor: ['#6366f1', '#f59e0b', '#10b981'],
                        borderWidth: 0
                    }]
                },
                options: { 
                    cutout: '70%',
                    plugins: { legend: { position: 'bottom', labels: { boxWidth: 12, font: { size: 10 } } } } 
                }
            });
        }

        fetchData();
    </script>
</body>
</html>
